name: Sync custom-models from amazon-bedrock-samples

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout amazon-bedrock-workshop
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sparse-checkout custom-models from amazon-bedrock-samples
        run: |
          git clone --filter=blob:none --sparse \
            https://github.com/aws-samples/amazon-bedrock-samples.git \
            /tmp/bedrock-samples
          cd /tmp/bedrock-samples
          git sparse-checkout set custom-models

      - name: Sync into 03_Model_customization
        run: |
          rsync -av --delete \
            /tmp/bedrock-samples/custom-models/ \
            03_Model_customization/

      - name: Overwrite README with sync notice
        run: |
          cat > 03_Model_customization/README.md << 'EOF'
          # Model Customization

          > ⚠️ **AWS event participants:** Model customization jobs (fine-tuning, continued pre-training, distillation) **cannot be run in AWS-managed event accounts** due to service quota restrictions. If you are at an AWS-run workshop, skip the hands-on portion of this module and use it as a reference. To run these labs, use your own AWS account.

          > **Note:** The contents of this folder are automatically synced from the canonical source:
          > [aws-samples/amazon-bedrock-samples/custom-models](https://github.com/aws-samples/amazon-bedrock-samples/tree/main/custom-models)
          >
          > Do not edit files here directly — changes will be overwritten on the next sync.
          > To contribute or report issues, please open a PR in the source repository.
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 03_Model_customization/
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync 03_Model_customization from amazon-bedrock-samples/custom-models"
            git push
          fi
